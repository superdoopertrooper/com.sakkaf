<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        background: #0a0a0f;
        color: #f4f4f5;
        padding: 2rem;
        overflow: hidden;
      }

      .map-bg {
        position: fixed;
        inset: -5%;
        z-index: 0;
        pointer-events: none;
      }

      .map-bg img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        opacity: 0.14;
        filter: brightness(0) saturate(100%) invert(52%) sepia(35%)
          saturate(1200%) hue-rotate(210deg) brightness(95%);
        animation: map-drift 90s ease-in-out infinite alternate;
      }

      .map-bg::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
            ellipse at 20% 20%,
            rgba(99, 102, 241, 0.18) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 80%,
            rgba(168, 85, 247, 0.14) 0%,
            transparent 50%
          );
      }

      .map-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 35%,
          #0a0a0f 78%
        );
      }

      @keyframes map-drift {
        from {
          transform: scale(1) translate(0, 0);
        }
        to {
          transform: scale(1.04) translate(-1.5%, -1%);
        }
      }

      main {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 32rem;
      }

      .badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #a5b4fc;
        border: 1px solid rgba(165, 180, 252, 0.25);
        border-radius: 9999px;
        padding: 0.4rem 1rem;
        margin-bottom: 2rem;
        background: rgba(99, 102, 241, 0.08);
        backdrop-filter: blur(8px);
      }

      h1 {
        font-size: clamp(2.5rem, 8vw, 4rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: 1.1;
        margin-bottom: 1.25rem;
        background: linear-gradient(135deg, #f4f4f5 0%, #a5b4fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        font-size: 1.125rem;
        line-height: 1.7;
        color: #a1a1aa;
      }

      .divider {
        width: 3rem;
        height: 2px;
        background: linear-gradient(90deg, transparent, #6366f1, transparent);
        margin: 2rem auto;
        border-radius: 1px;
      }

      .social {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 2.5rem;
      }

      .social a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 9999px;
        color: #c7d2fe;
        background: rgba(99, 102, 241, 0.08);
        border: 1px solid rgba(165, 180, 252, 0.2);
        backdrop-filter: blur(8px);
        transition: color 0.2s ease, background 0.2s ease,
          border-color 0.2s ease, transform 0.2s ease;
      }

      .social a:hover {
        color: #f4f4f5;
        background: rgba(99, 102, 241, 0.18);
        border-color: rgba(165, 180, 252, 0.45);
        transform: translateY(-2px);
      }

      .social svg {
        width: 1.15rem;
        height: 1.15rem;
        fill: currentColor;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="map-bg" aria-hidden="true">
      <img src="world-map.svg" alt="" />
    </div>
    <main>

    </main>
